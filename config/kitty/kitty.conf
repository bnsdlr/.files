font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 18.0
force_ltr no
disable_ligatures always
font_features JetBrainsMonoNF-Regular -liga -calt -dlig
font_features JetBrainsMonoNF-Bold -liga -calt -dlig
font_features JetBrainsMonoNF-Italic -liga -calt -dlig
font_features JetBrainsMonoNF-BoldItalic -liga -calt -dlig
box_drawing_scale 0.001, 1, 1.5, 2
cursor #524f67
cursor_text_color #e0def4
cursor_shape block
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0
cursor_stop_blinking_after 0.0

include vague.conf
