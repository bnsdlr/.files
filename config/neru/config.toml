[general]
hide_overlay_in_screen_share = true

[theme.dark]
surface = "#141415"
accent = "#524F67"
accent_alt = "#7E98E8"
on_accent_alt = "#141415"
text = "#CDCDCD"

[hotkeys]
"Ctrl+Shift+Space" = "hints"
"Ctrl+Shift+G" = "grid"
"Ctrl+Shift+C" = "recursive_grid"
"Ctrl+Shift+S" = "scroll"
"Ctrl+Shift+A" = "toggle-screen-share"
"Ctrl+Shift+^" = "toggle-cursor-follow-selection"

[hints]
hint_characters = "arstdhneio"               # Characters used for hint labels
include_menubar_hints = true
include_nc_hints = true

[hints.hotkeys]
"Space" = "action reset"

[grid]
enabled = true
characters = "abcdefghijklmnpqrstuvwxyz"    # Primary grid labels
sublayer_keys = "abcdefghijklmnpqrstuvwxyz" # Subgrid labels (fallback to characters)
live_match_update = true                    # Highlight cells as you type
hide_unmatched = true                       # Hide non-matching cells
prewarm_enabled = true                      # Pre-compute grid on startup (~1.5MB RAM)
enable_gc = false                           # Periodic memory cleanup (adds CPU overhead)

[recursive_grid]
keys = "lune"                               # Cell selection keys (must be grid_cols * grid_rows chars)

[scroll.hotkeys]
"go" = "action go_top"

[smooth_cursor]
move_mouse_enabled = true
